name: cling
description: A Money Management App.
publish_to: 'none'
version: 0.1.2+3

environment:
  sdk: '>=3.0.6 <4.0.0'

dependencies:
  auto_size_text_field: ^2.2.1
  awesome_notifications: ^0.8.2
  bloc: ^8.1.2
  cloud_firestore: ^4.9.2
  connectivity_plus: ^5.0.0
  currency_text_input_formatter: ^2.1.10
  device_preview: ^1.1.0
  dropdown_button2: ^2.3.6
  email_validator: ^2.1.17
  equatable: ^2.0.5
  firebase_analytics: ^10.4.4
  firebase_auth: ^4.7.2
  firebase_core: ^2.15.0
  firebase_crashlytics: ^3.3.4
  firebase_messaging: ^14.6.5
  firebase_storage: ^11.5.6
  flutter:
    sdk: flutter
  flutter_bloc: ^8.1.3
  flutter_expandable_fab: ^2.0.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.3.1
  flutter_svg: ^2.0.7
  fluttertoast: ^8.2.2
  get_it: ^7.6.0
  intl: ^0.18.0
  lottie: ^2.5.0
  math_expressions: ^2.4.0
  modal_bottom_sheet: ^3.0.0-pre
  money_formatter: ^0.0.4
  month_year_picker: ^0.3.0+1
  nil: ^1.1.1
  numberpicker: ^2.1.2
  onesignal_flutter: ^5.0.4
  package_info_plus: ^5.0.1
  pull_to_refresh_flutter3: ^2.0.2
  recaptcha_enterprise_flutter: ^18.4.0
  rename: ^3.0.0
  shared_preferences: ^2.2.0
  sizer: ^2.0.15
  smooth_page_indicator: ^1.1.0
  sqflite: ^2.3.0
  super_tooltip: ^2.0.7
  syncfusion_flutter_charts: ^24.1.44+1
  syncfusion_flutter_datepicker: ^24.1.41
  timeago: ^3.6.0
  transitioned_indexed_stack: ^1.0.2
  url_launcher: ^6.2.3

# dependency_overrides:
#   built_value: 8.6.0
dev_dependencies:
  arb_generator: ^0.0.3
  #flutter_gen: ^5.3.2
  build_runner: ^2.4.6
  flutter_launcher_icons: ^0.13.1
  flutter_lints: ^3.0.1
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/resources/images/logo_png.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - lib/resources/images/
    - lib/resources/images_png/
    - lib/resources/anim/
  fonts:
    - family: Bungee
      fonts:
        - asset: lib/resources/fonts/Bungee-Regular.ttf
    - family: Cabinet Grotesk
      fonts:
        - asset: lib/resources/fonts/CabinetGrotesk-Bold.otf
        - asset: lib/resources/fonts/CabinetGrotesk-Regular.otf

arb_generator:
  input_filepath: "lib/resources/localization/localization_cling.csv"
  output_directory: "lib/l10n"
  filename_prepend: "app_"
  csv_settings:
    delimiter: ","
    description_index: null
    base_index: 1

flutter_gen:
  output: lib/resources/gen/
  integrations:
    flutter_svg: true
