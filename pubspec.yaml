name: cling
description: A Money Management App.
publish_to: "none"
version: 0.2.1+6

environment:
  sdk: ">=3.0.6 <4.0.0"

dependencies:
  auto_size_text_field: ^2.2.1
  bloc: ^9.0.0
  cloud_firestore: ^6.1.3
  connectivity_plus: ^7.0.0
  currency_text_input_formatter: ^2.1.10
  dropdown_button2: ^3.0.0
  email_validator: ^3.0.0
  equatable: ^2.0.5
  firebase_analytics: ^12.1.3
  firebase_auth: ^6.2.0
  firebase_core: ^4.5.0
  firebase_crashlytics: ^5.0.8
  firebase_messaging: ^16.1.2
  firebase_storage: ^13.1.0
  flutter:
    sdk: flutter
  flutter_bloc: ^9.0.0
  flutter_expandable_fab: ^2.0.0
  flutter_localizations:
    sdk: flutter
  flutter_native_splash: ^2.3.1
  flutter_svg: ^2.0.7
  fluttertoast: ^9.0.0
  get_it: ^9.2.1
  intl: ^0.20.2
  lottie: ^3.1.0
  math_expressions: ^3.1.0
  modal_bottom_sheet: ^3.0.0-pre
  money_formatter: ^0.0.4
  month_year_picker: ^0.5.0+1
  nil: ^1.1.1
  numberpicker: ^2.1.2
  package_info_plus: ^9.0.0
  pull_to_refresh_flutter3: ^2.0.2
  recaptcha_enterprise_flutter: ^18.4.0
  rename: ^3.0.0
  shared_preferences: ^2.2.0
  smooth_page_indicator: ^2.0.1
  sqflite: ^2.3.0
  super_tooltip: ^2.0.7
  syncfusion_flutter_charts: ^32.2.9
  syncfusion_flutter_datepicker: ^32.2.9
  timeago: ^3.6.0
  transitioned_indexed_stack: ^1.0.2
  url_launcher: ^6.2.3

# dependency_overrides:
#   built_value: 8.6.0
dev_dependencies:
  arb_generator: ^0.0.3
  build_runner: ^2.4.6
  #flutter_gen: ^5.3.2
  change_app_package_name: ^1.3.0
  flutter_launcher_icons: ^0.14.3
  flutter_lints: ^6.0.0
  flutter_test:
    sdk: flutter

flutter_launcher_icons:
  android: "launcher_icon"
  ios: true
  image_path: "lib/resources/images/logo_png.png"

flutter:
  generate: true
  uses-material-design: true
  assets:
    - lib/resources/images/
    - lib/resources/images_png/
    - lib/resources/anim/
  fonts:
    - family: Bungee
      fonts:
        - asset: lib/resources/fonts/bungee/Bungee-Regular.ttf
    - family: Cabinet Grotesk
      fonts:
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Thin.otf
          weight: 100
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Extralight.otf
          weight: 200
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Light.otf
          weight: 300
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Regular.otf
          weight: 400
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Medium.otf
          weight: 500
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Bold.otf
          weight: 700
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Extrabold.otf
          weight: 800
        - asset: lib/resources/fonts/cabinet-grotesk/CabinetGrotesk-Black.otf
          weight: 900

arb_generator:
  input_filepath: "lib/resources/localization/localization_cling.csv"
  output_directory: "lib/l10n"
  filename_prepend: "app_"
  csv_settings:
    delimiter: ","
    description_index: null
    base_index: 1

flutter_gen:
  output: lib/resources/gen/
  integrations:
    flutter_svg: true
